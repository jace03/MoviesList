name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Backend: lint, build, test
  # ──────────────────────────────────────────────
  backend:
    name: Backend (PHP / Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Lint with Laravel Pint
        run: ./vendor/bin/pint --test

      - name: Run PHPUnit tests
        run: php artisan test --env=testing

  # ──────────────────────────────────────────────
  # Frontend: type-check, build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (React / TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: MovieListFrontEnd/frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: MovieListFrontEnd/frontend
        run: npm ci

      - name: TypeScript type-check
        working-directory: MovieListFrontEnd/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: MovieListFrontEnd/frontend
        run: npm run build
